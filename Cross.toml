# Cross.toml — конфигурация кросс-компиляции для MIPS (Keenetic Viva)
# Документация: https://github.com/cross-rs/cross

# Настройки для целевой платформы mipsel-unknown-linux-gnu
[target.mipsel-unknown-linux-gnu]

# 🔧 ИСПРАВЛЕНО: build-std — булево значение (true), а не массив
# Конкретные компоненты указываются в командной строке: -Z build-std=core,alloc,...
build-std = true

# Передаём флаги компиляции для оптимизации под роутер
[target.mipsel-unknown-linux-gnu.env]
passthrough = [
    "RUSTFLAGS=-C linker-plugin-lto -C opt-level=z -C strip=symbols -C panic=abort"
]

# Образ Docker для кросс-компиляции
[target.mipsel-unknown-linux-gnu.image]
name = "ghcr.io/cross-rs/mipsel-unknown-linux-gnu:main"

# 🔧 ИСПРАВЛЕНО: pre-build — массив строк (команд), а не блок со script
[target.mipsel-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y pkg-config libssl-dev musl-tools"
]
