# Cross.toml — конфигурация кросс-компиляции для MIPS (Keenetic Viva)
# Документация: https://github.com/cross-rs/cross

# Настройки для целевой платформы mipsel-unknown-linux-gnu
[target.mipsel-unknown-linux-gnu]

# Собираем стандартную библиотеку из исходников (обязательно для Tier 3)
build-std = true

# 🔧 image — простая строка, НЕ таблица!
image = "ghcr.io/cross-rs/mipsel-unknown-linux-gnu:main"

# Команды для установки зависимостей внутри Docker-контейнера
pre-build = [
    "apt-get update && apt-get install -y pkg-config libssl-dev musl-tools"
]

# 🔧 Передаём флаги компиляции (УБРАЛИ -C panic=abort — он вызывает ошибку с panic_abort)
[target.mipsel-unknown-linux-gnu.env]
passthrough = [
    "RUSTFLAGS=-C linker-plugin-lto -C opt-level=z -C strip=symbols"
]
