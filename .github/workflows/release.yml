name: Build for MIPS

on:
  workflow_dispatch:  # запуск вручную

jobs:
  build-mips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: mipsel-unknown-linux-gnu

      - name: Install cross-compiler
        run: |
          sudo apt update
          sudo apt install -y gcc-mipsel-linux-gnu

      - name: Configure linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [target.mipsel-unknown-linux-gnu]
          linker = "mipsel-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target mipsel-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: telemt-mipsel
          path: target/mipsel-unknown-linux-gnu/release/telemt
