# .github/workflows/build-mips.yml
name: Build for MIPS (Keenetic)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mips:
    name: Build telemt for mipsel-unknown-linux-gnu
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cross
        run: cargo install cross --locked --force

      - name: Increase swap space (for build-std)
        run: |
          if [ $(swapon --show | wc -l) -eq 0 ]; then
            echo "Creating 4G swap file with dd..."
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          else
            echo "Swap already active"
            swapon --show
          fi
          free -h
        continue-on-error: true

      # 🔧 ИСПРАВЛЕНО: компоненты build-std передаются в команде, а не в Cross.toml
      - name: Build telemt with cross + build-std
        run: |
          cross +nightly build \
            -Z build-std=core,alloc,std,proc_macro \
            --target mipsel-unknown-linux-gnu \
            --release \
            --verbose

      - name: Verify binary
        run: |
          echo "=== Binary info ==="
          file target/mipsel-unknown-linux-gnu/release/telemt
          echo ""
          echo "=== Binary size ==="
          ls -lh target/mipsel-unknown-linux-gnu/release/telemt
          target/mipsel-unknown-linux-gnu/release/telemt --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telemt-mipsel-keenetic
          path: target/mipsel-unknown-linux-gnu/release/telemt
          retention-days: 7
          compression-level: 0
