# .github/workflows/build-mips.yml
# Сборка telemt для Keenetic Viva (MIPS, mipsel-unknown-linux-gnu)
# Запускается вручную через вкладку Actions

name: Build for MIPS (Keenetic)

on:
  workflow_dispatch:  # ручной запуск

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  CARGO_UNSTABLE_BUILD_STD: 'core,alloc,std,proc_macro'

jobs:
  build-mips:
    name: Build telemt for mipsel-unknown-linux-gnu
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cross
        run: cargo +nightly install cross --locked --force

      # 🔧 ИСПРАВЛЕННЫЙ ШАГ: создание swap через dd (совместимо с GitHub Actions)
      - name: Increase swap space (for build-std)
        run: |
          # Проверяем, есть ли уже swap
          if [ $(swapon --show | wc -l) -eq 0 ]; then
            echo "Creating 4G swap file with dd..."
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          else
            echo "Swap already active, skipping creation"
            swapon --show
          fi
          free -h
        continue-on-error: true  # если не получится — пробуем собрать без доп. swap

      - name: Build telemt with cross + build-std
        run: |
          cargo +nightly cross build \
            -Z build-std=core,alloc,std,proc_macro \
            --target mipsel-unknown-linux-gnu \
            --release \
            --verbose

      - name: Verify binary
        run: |
          echo "=== Binary info ==="
          file target/mipsel-unknown-linux-gnu/release/telemt
          echo ""
          echo "=== Binary size ==="
          ls -lh target/mipsel-unknown-linux-gnu/release/telemt
          echo ""
          echo "=== Test run (may fail without config, that's OK) ==="
          target/mipsel-unknown-linux-gnu/release/telemt --help || true

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telemt-mipsel-keenetic
          path: target/mipsel-unknown-linux-gnu/release/telemt
          retention-days: 7
          compression-level: 0
