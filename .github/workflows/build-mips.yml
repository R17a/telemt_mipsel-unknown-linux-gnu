# .github/workflows/build-mips.yml
# Сборка telemt для Keenetic Viva (MIPS, mipsel-unknown-linux-gnu)
# Запускается вручную через вкладку Actions

name: Build for MIPS (Keenetic)

on:
  workflow_dispatch:  # ручной запуск

env:
  # Подавляем предупреждение о Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mips:
    name: Build telemt for mipsel-unknown-linux-gnu
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2. Устанавливаем nightly toolchain + rust-src (исходники std)
      - name: Install Rust nightly with rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # 3. Устанавливаем cross как ОТДЕЛЬНЫЙ бинарник (не подкоманда cargo!)
      - name: Install cross
        run: cargo +nightly install cross --locked --force

      # 4. (Опционально) Увеличиваем swap для сборки больших зависимостей
      - name: Increase swap space (for build-std)
        run: |
          if [ $(swapon --show | wc -l) -eq 0 ]; then
            echo "Creating 4G swap file with dd..."
            sudo dd if=/dev/zero of=/swapfile bs=1M count=4096 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          else
            echo "Swap already active"
            swapon --show
          fi
          free -h
        continue-on-error: true

      # 🔧 5. ПАТЧ: Заменяем AtomicU64 → AtomicU32 (MIPS32 не поддерживает 64-битные атомики)
      - name: Apply MIPS atomic patch
        run: |
          echo "=== Applying AtomicU64 -> AtomicU32 patch for MIPS32 ==="
          
          # Заменяем ВСЕ вхождения AtomicU64 на AtomicU32 в исходных файлах
          find src -name "*.rs" -type f -exec sed -i 's/AtomicU64/AtomicU32/g' {} \;
          
          # Проверяем результат
          echo "=== Verification ==="
          if grep -r "AtomicU64" src/; then
            echo "❌ ERROR: AtomicU64 still found in source!"
            exit 1
          else
            echo "✅ All AtomicU64 successfully replaced with AtomicU32"
          fi

      # 🔧 6. Сборка проекта — cross вызывается НАПРЯМУЮ, не через cargo!
      - name: Build telemt with cross + build-std
        run: |
          # ✅ ПРАВИЛЬНЫЙ СИНТАКСИС: cross +nightly build (не cargo +nightly cross build!)
          cross +nightly build \
            -Z build-std=core,alloc,std,proc_macro \
            --target mipsel-unknown-linux-gnu \
            --release \
            --verbose

      # 7. Проверка собранного бинарника
      - name: Verify binary
        run: |
          echo "=== Binary info ==="
          file target/mipsel-unknown-linux-gnu/release/telemt
          echo ""
          echo "=== Binary size ==="
          ls -lh target/mipsel-unknown-linux-gnu/release/telemt
          echo ""
          echo "=== Test run (may fail without config, that's OK) ==="
          target/mipsel-unknown-linux-gnu/release/telemt --help || true

      # 8. Загрузка артефакта для скачивания
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: telemt-mipsel-keenetic
          path: target/mipsel-unknown-linux-gnu/release/telemt
          retention-days: 7
          compression-level: 0
